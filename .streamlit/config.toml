# =====================================================================
# サーバ設定：URL（ポート）を固定して、毎回同じアドレスで開けるようにする。
#   ローカルで開く    → http://localhost:8534
#   同じLAN内の別端末 → http://<このPCのIP>:8534  （address を "0.0.0.0" にした時のみ）
# ※ address="localhost" は同じPC内のみ。他端末からも開くなら "0.0.0.0" に変える。
# ※ ポートが使用中だと起動できないので、その時だけ別番号に。
# =====================================================================
[server]
port = 8534
address = "0.0.0.0"       # 同じWiFi(LAN)の他端末からも開ける。自分だけにするなら "localhost"
headless = false          # 自分のPCでは起動時にブラウザを自動で開く
runOnSave = false         # 保存のたびの自動再実行を止める（不意のリセット防止）
enableCORS = false        # 同一LAN内からの接続を許可
enableXsrfProtection = false

# 官公庁向けの信頼感ある青系テーマ（ウィジェットの基調色。詳細な装飾は app.py のCSSで付与）
[theme]
primaryColor = "#1E5FA8"
backgroundColor = "#F6F8FC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1A2733"
font = "sans serif"
